<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Fantasy League</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --gold: #C9A84C;
    --gold-dim: #8A6B28;
    --pitch: #0B3D1E;
    --pitch-mid: #112E18;
    --pitch-light: #1A4A28;
    --surface: #0E1A12;
    --border: rgba(201,168,76,0.18);
    --text: #E8EDE9;
    --muted: #7A9480;
    --red: #E05050;
    --green: #4EC97B;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--surface);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header {
    background: linear-gradient(160deg, #0a3018 0%, #0B3D1E 50%, #082810 100%);
    border-bottom: 2px solid var(--gold);
    padding: 28px 24px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% -20%, rgba(201,168,76,0.12) 0%, transparent 65%);
    pointer-events: none;
  }
  .header-inner { position: relative; z-index: 1; }
  .header-eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 6px;
  }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.4rem, 7vw, 4.2rem);
    letter-spacing: 0.1em;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 2px 24px rgba(201,168,76,0.3);
  }
  .header-divider {
    width: 48px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 10px auto;
  }
  .header-sub {
    font-size: 0.72rem;
    color: rgba(232,237,233,0.5);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .header-draft {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.1rem, 3vw, 1.55rem);
    letter-spacing: 0.06em;
    color: var(--text);
    margin-top: 2px;
    line-height: 1.3;
  }
  .header-draft .draft-prefix { color: rgba(232,237,233,0.45); font-size: 0.75em; }
  .header-draft .draft-name {
    color: var(--gold);
    text-shadow: 0 0 18px rgba(201,168,76,0.5);
    animation: pulse-name 2.5s ease-in-out infinite;
  }
  .header-draft .draft-suffix { color: rgba(232,237,233,0.45); font-size: 0.75em; }
  @keyframes pulse-name {
    0%, 100% { text-shadow: 0 0 12px rgba(201,168,76,0.4); }
    50% { text-shadow: 0 0 28px rgba(201,168,76,0.85); }
  }
  .header-trophy {
    font-size: 1.6rem;
    line-height: 1;
    margin-bottom: 4px;
    filter: drop-shadow(0 0 8px rgba(201,168,76,0.4));
  }
  .last-updated { font-size: 0.68rem; color: var(--muted); margin-top: 8px; }
  .refresh-btn {
    position: absolute; top: 18px; right: 18px;
    background: transparent; border: 1px solid var(--border);
    color: var(--gold); padding: 6px 13px; border-radius: 4px;
    cursor: pointer; font-size: 0.75rem; letter-spacing: 0.05em; transition: background 0.2s;
  }
  .refresh-btn:hover { background: rgba(201,168,76,0.1); }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 16px; }
  section { margin-top: 32px; }

  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; letter-spacing: 0.1em;
    color: var(--gold-dim); border-bottom: 1px solid var(--border);
    padding-bottom: 6px; margin-bottom: 14px;
  }

  /* ── Main league table ── */
  .league-table { width: 100%; border-collapse: collapse; }
  .league-table th {
    font-size: 0.63rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); padding: 6px 6px 8px; text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .league-table th.left { text-align: left; }
  .league-table td {
    padding: 10px 6px; font-size: 0.82rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle; text-align: center;
  }
  .league-table td.left { text-align: left; }
  .league-table tr:hover td { background: rgba(255,255,255,0.02); }

  .pos { font-size: 0.8rem; color: var(--muted); width: 24px; }
  .pos-medal { font-size: 1.1rem; width: 24px; }

  .player-name { font-weight: 700; font-size: 0.9rem; white-space: nowrap; }
  .player-name.leader {
    color: #58C4F5;
    text-shadow: 0 0 10px rgba(88,196,245,0.35);
  }
  .leader-row td { background: rgba(88,196,245,0.04) !important; }

  /* country point cells */
  .country-cell {
    min-width: 52px;
    border-radius: 4px;
    padding: 6px 4px !important;
  }
  .country-name {
    font-size: 0.62rem; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 56px; margin: 0 auto;
  }
  .country-pts {
    font-size: 1rem; font-weight: 700; line-height: 1.2;
  }
  .country-pts.zero { color: var(--muted); font-weight: 400; }
  .country-pts.positive { color: var(--text); }
  .country-cell.not-played { opacity: 0.35; }
  .country-cell.bonus-team { background: rgba(78,201,123,0.08); border: 1px solid rgba(78,201,123,0.25); }

  .bonus-col { color: var(--green); font-weight: 700; font-size: 0.95rem; }
  .bonus-col.zero { color: var(--muted); font-weight: 400; }
  .total-col { font-weight: 700; font-size: 1.05rem; }

  .bonus-row td { background: rgba(78,201,123,0.05) !important; }

  /* ── Match cards ── */
  .match-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
  }
  .match-card {
    background: var(--pitch-mid); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px; font-size: 0.82rem;
  }
  .match-meta {
    font-size: 0.67rem; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.06em; margin-bottom: 8px;
    display: flex; justify-content: space-between;
  }
  .match-teams { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .match-team { flex: 1; }
  .match-team.right { text-align: right; }
  .match-team-name { font-weight: 600; font-size: 0.88rem; }
  .match-team-owner { font-size: 0.68rem; color: var(--muted); }
  .match-score {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem;
    letter-spacing: 0.05em; color: var(--gold); min-width: 56px; text-align: center;
  }
  .match-score.upcoming { color: var(--muted); font-size: 1rem; }
  .match-type-badge { font-size: 0.64rem; border-radius: 3px; padding: 1px 5px; }
  .badge-ko { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid var(--border); }
  .badge-group { background: rgba(26,74,40,0.5); color: var(--muted); border: 1px solid rgba(255,255,255,0.06); }

  /* ── All teams table ── */
  .teams-table { width: 100%; border-collapse: collapse; }
  .teams-table th {
    font-size: 0.63rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); padding: 6px 10px 8px;
    border-bottom: 1px solid var(--border);
  }
  .teams-table th.r, .teams-table td.r { text-align: right; }
  .teams-table td {
    padding: 9px 10px; font-size: 0.84rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }
  .teams-table tr:hover td { background: rgba(255,255,255,0.02); }
  .gd-pos { color: var(--green); }
  .gd-neg { color: var(--red); }
  .bonus-badge {
    font-size: 0.68rem; color: var(--green);
    background: rgba(78,201,123,0.10); border: 1px solid rgba(78,201,123,0.25);
    border-radius: 3px; padding: 1px 5px; margin-left: 6px;
  }

  /* ── Status ── */
  #status { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.9rem; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 700px) {
    .country-name { font-size: 0.55rem; max-width: 44px; }
    .country-pts { font-size: 0.85rem; }
    .country-cell { min-width: 40px; }
  }
</style>
</head>
<body>

<header>
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  <div class="header-inner">
    <div class="header-trophy">🏆</div>
    <div class="header-eyebrow">FIFA World Cup 2026 · Fantasy Draft</div>
    <div class="header-title">World Cup 2026</div>
    <div class="header-divider"></div>
    <div class="header-sub">The stakes are real. The glory is eternal.</div>
    <div class="header-draft">
      <span class="draft-prefix">and with the first pick&nbsp;</span><span class="draft-name" id="leader-name">…</span><span class="draft-suffix">&nbsp;selects…</span>
    </div>
    <div class="last-updated" id="last-updated"></div>
  </div>
</header>

<div class="container">
  <div id="status"><div class="spinner"></div>Loading match data…</div>
  <div id="content" style="display:none">

    <section>
      <div class="section-label">🏆 League Table</div>
      <div style="overflow-x:auto">
        <table class="league-table" id="league-table">
          <thead>
            <tr id="league-thead"></tr>
          </thead>
          <tbody id="league-tbody"></tbody>
        </table>
      </div>
    </section>

    <section>
      <div class="section-label">⚽ Last 5 Results</div>
      <div class="match-grid" id="recent-matches"></div>
    </section>

    <section>
      <div class="section-label">📅 Next 5 Fixtures</div>
      <div class="match-grid" id="upcoming-matches"></div>
    </section>

    <section>
      <div class="section-label">🌍 All 48 Teams — Ranked by Points</div>
      <table class="teams-table">
        <thead>
          <tr>
            <th style="width:32px"></th>
            <th>Team</th>
            <th>Owner</th>
            <th class="r">GP</th>
            <th class="r">GD</th>
            <th class="r">Pts</th>
          </tr>
        </thead>
        <tbody id="teams-body"></tbody>
      </table>
    </section>

  </div>
</div>

<script>
const PLAYERS = {
  Chris:  ["France", "USA", "Ecuador", "Norway", "Scotland", "Ghana"],
  Edd:    ["England", "Mexico", "Australia", "Canada", "Tunisia", "Saudi Arabia"],
  Phil:   ["Argentina", "Senegal", "Austria", "Sweden", "Paraguay", "Haiti"],
  Emily:  ["Portugal", "Colombia", "Iran", "Ivory Coast", "Qatar", "Jordan"],
  Amy:    ["Netherlands", "Belgium", "Turkey", "Czech Republic", "Iraq", "Curacao"],
  Adam:   ["Brazil", "Croatia", "South Korea", "Algeria", "DR Congo", "Cape Verde"],
  Ralph:  ["Morocco", "Germany", "Japan", "Egypt", "Uzbekistan", "Bosnia & Herzegovina"],
  Packer: ["Spain", "Uruguay", "Switzerland", "Panama", "South Africa", "New Zealand"]
};

// Maps every name variant (lower-cased) -> canonical name as used in PLAYERS
// Canonical is the PLAYERS key; aliases are what the API might use
const NAME_MAP = (() => {
  const m = {};
  // identity for all player team names
  for (const teams of Object.values(PLAYERS))
    for (const t of teams) m[t.toLowerCase()] = t;
  // explicit aliases -> canonical
  const aliases = {
    "USA":                    ["united states", "united states of america"],
    "Ivory Coast":            ["côte d'ivoire", "cote d'ivoire"],
    "Bosnia & Herzegovina":   ["bosnia-herzegovina", "bosnia and herzegovina", "bosnia & herzegovina"],
    "DR Congo":               ["congo dr", "democratic republic of congo", "drc", "dr congo"],
    "Cape Verde":             ["cabo verde"],
    "South Korea":            ["korea republic", "korea dpr"],
    "Curacao":                ["curaçao"],
  };
  for (const [canon, alts] of Object.entries(aliases))
    for (const a of alts) m[a.toLowerCase()] = canon;
  return m;
})();

function resolveTeam(apiName) {
  if (!apiName) return null;
  return NAME_MAP[apiName.toLowerCase()] || null;
}

// reverse: canonical team name -> player name
const TEAM_TO_PLAYER = {};
for (const [player, teams] of Object.entries(PLAYERS))
  for (const t of teams) TEAM_TO_PLAYER[t] = player;

const KNOCKOUT_ROUNDS = ["round of 32","round of 16","quarter-final","semi-final","third place","final"];
function isKnockout(round) {
  return round && KNOCKOUT_ROUNDS.some(r => round.toLowerCase().includes(r));
}

const MEDALS = {0:"🥇", 1:"🥈", 2:"🥉"};

async function loadData() {
  document.getElementById("status").style.display = "block";
  document.getElementById("content").style.display = "none";
  document.getElementById("status").innerHTML = '<div class="spinner"></div>Loading match data…';

  const API_KEY = "a0cffb2e8d36b1d174035bcfe927cf04";
  const API_BASE = "https://v3.football.api-sports.io";
  const WC_LEAGUE = 1;      // FIFA World Cup
  const WC_SEASON = 2026;

  if (window.location.protocol === 'file:') {
    document.getElementById("status").innerHTML =
      `⚠️ Open this via GitHub Pages, not as a local file.`;
    return;
  }

  async function apiFetch(path) {
    const res = await fetch(API_BASE + path, {
      headers: { "x-apisports-key": API_KEY }
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }

  // Convert API-Football fixture to our internal match format
  // API status: NS=not started, 1H/2H/HT=live, FT/AET/PEN=finished
  function convertFixture(f) {
    const home = f.teams.home.name;
    const away = f.teams.away.name;
    const status = f.fixture.status.short;
    const finished = ["FT","AET","PEN"].includes(status);
    const live = ["1H","2H","HT","ET","BT","P","INT"].includes(status);
    const date = f.fixture.date ? f.fixture.date.split("T")[0] : null;
    const time = f.fixture.date ? f.fixture.date.split("T")[1]?.slice(0,5) : null;
    // Round label
    const round = f.league.round || "";
    return {
      date, time,
      team1: home,
      team2: away,
      round,
      status,
      live,
      elapsed: f.fixture.status.elapsed,
      score: finished || live ? {
        ft: [f.goals.home ?? 0, f.goals.away ?? 0]
      } : null,
      // for display only — goals during live
      liveScore: live ? [f.goals.home ?? 0, f.goals.away ?? 0] : null,
    };
  }

  let allMatches = [];
  let debugInfo = "";
  try {
    // API-Football uses league ID 1 for FIFA World Cup on v3.football.api-sports.io
    // Try league 1 first, then fall back to searching by name
    let data = await apiFetch(`/fixtures?league=${WC_LEAGUE}&season=${WC_SEASON}`);
    debugInfo = `league=1: ${data.response?.length ?? 0} fixtures, errors: ${JSON.stringify(data.errors)}`;

    if (!data.response?.length) {
      // Try searching for the league to find the right ID
      const leagueData = await apiFetch(`/leagues?season=${WC_SEASON}&type=Cup`);
      const wcLeague = leagueData.response?.find(r =>
        r.league.name.toLowerCase().includes("world cup") &&
        !r.league.name.toLowerCase().includes("women") &&
        !r.league.name.toLowerCase().includes("youth") &&
        !r.league.name.toLowerCase().includes("quali")
      );
      debugInfo += ` | League search: ${wcLeague ? wcLeague.league.id + ' ' + wcLeague.league.name : 'not found'}`;

      if (wcLeague) {
        data = await apiFetch(`/fixtures?league=${wcLeague.league.id}&season=${WC_SEASON}`);
        debugInfo += ` | fixtures with found ID: ${data.response?.length ?? 0}`;
      }
    }

    if (!data.response?.length) {
      throw new Error(`No fixtures found. Debug: ${debugInfo}`);
    }
    allMatches = data.response.map(convertFixture);
  } catch(e) {
    document.getElementById("status").innerHTML =
      `⚠️ Could not load match data.<br><br>
       <details style="margin:12px auto;max-width:500px;text-align:left;font-size:0.75rem;color:var(--muted)">
         <summary style="cursor:pointer;color:var(--gold)">Show diagnostic info</summary>
         <pre style="margin-top:8px;white-space:pre-wrap;word-break:break-all">${e.message}</pre>
       </details>
       <button onclick="loadData()" style="background:var(--pitch);border:1px solid var(--gold);color:var(--gold);padding:8px 18px;border-radius:4px;cursor:pointer;font-size:0.85rem">↻ Try Again</button>`;
    return;
  }

  if (!allMatches.length) {
    document.getElementById("status").innerHTML = "⚠️ No match data returned.";
    return;
  }

  function matchDateTime(m) {
    return new Date((m.date || '1970-01-01') + 'T' + (m.time || '00:00') + ':00');
  }
  allMatches.sort((a, b) => matchDateTime(a) - matchDateTime(b));

  // ── Per-team stats (no double counting) ──
  // Key: canonical team name
  const teamStats = {};
  for (const teams of Object.values(PLAYERS))
    for (const t of teams)
      teamStats[t] = { pts:0, gf:0, ga:0, gp:0 };

  for (const m of allMatches) {
    if (!m.score?.ft) continue;
    const [g1, g2] = m.score.ft;
    const t1 = resolveTeam(m.team1);
    const t2 = resolveTeam(m.team2);
    if (t1 && teamStats[t1]) {
      teamStats[t1].gp++;
      teamStats[t1].gf += g1; teamStats[t1].ga += g2;
      teamStats[t1].pts += g1 > g2 ? 3 : g1 === g2 ? 1 : 0;
    }
    if (t2 && teamStats[t2]) {
      teamStats[t2].gp++;
      teamStats[t2].gf += g2; teamStats[t2].ga += g1;
      teamStats[t2].pts += g2 > g1 ? 3 : g1 === g2 ? 1 : 0;
    }
  }

  // ── Bonus: worst 3 teams get +5/+3/+1. Ties all get that slot's value; next slots skipped.
  // e.g. 2x joint 1st => both get 5, then next award is 1 (slot 2), not 3
  // e.g. 1st + 2x joint 2nd => 5, 3 & 3 (no 3rd awarded)
  const bonusValues = [5, 3, 1];
  const bonusDeductions = {};
  const worstTeams = [];

  const teamList = Object.entries(teamStats)
    .filter(([, ts]) => ts.gp > 0)
    .sort(([,a],[,b]) => a.pts !== b.pts ? a.pts - b.pts : (a.gf-a.ga) - (b.gf-b.ga));

  let slot = 0;       // which bonus slot we're awarding (0=5pts, 1=3pts, 2=1pt)
  let rank = 0;       // position in teamList
  while (slot < 3 && rank < teamList.length) {
    const [, ts0] = teamList[rank];
    // collect all teams tied with this one
    let end = rank + 1;
    while (end < teamList.length) {
      const [, tsN] = teamList[end];
      if (tsN.pts !== ts0.pts || (tsN.gf - tsN.ga) !== (ts0.gf - ts0.ga)) break;
      end++;
    }
    const tiedTeams = teamList.slice(rank, end);
    const bonusForSlot = bonusValues[slot]; // every tied team gets this full value
    for (const [team] of tiedTeams) {
      const player = TEAM_TO_PLAYER[team];
      if (player) bonusDeductions[player] = (bonusDeductions[player] || 0) + bonusForSlot;
      worstTeams.push({ team, player, bonus: bonusForSlot });
    }
    // skip as many slots as there were tied teams (they consumed those positions)
    slot += tiedTeams.length;
    rank = end;
  }

  // ── Player stats (summed from team stats) ──
  const playerStats = {};
  for (const [player, teams] of Object.entries(PLAYERS)) {
    let pts = 0, gf = 0, ga = 0;
    for (const t of teams) {
      const ts = teamStats[t];
      pts += ts.pts; gf += ts.gf; ga += ts.ga;
    }
    const bonus = bonusDeductions[player] || 0;
    playerStats[player] = { pts, gf, ga, gd: gf-ga, bonus, total: pts + bonus };
  }

  const standings = Object.entries(playerStats)
    .map(([player, s]) => ({ player, ...s }))
    .sort((a,b) => b.total !== a.total ? b.total - a.total : b.pts !== a.pts ? b.pts - a.pts : b.gd - a.gd);

  // ── Update header leader ──
  const leaderEl = document.getElementById('leader-name');
  if (leaderEl && standings.length) leaderEl.textContent = standings[0].player;

  // ── Knockout eliminations ──
  const eliminatedTeams = new Set();
  for (const m of allMatches) {
    if (!isKnockout(m.round) || !m.score?.ft) continue;
    const [g1, g2] = m.score.ft;
    if (g1 > g2) eliminatedTeams.add(resolveTeam(m.team2));
    else if (g2 > g1) eliminatedTeams.add(resolveTeam(m.team1));
  }

  // ── Render league table ──
  // Header row: Pos | Player | [6 country cols] | Bonus | Total
  const thead = document.getElementById("league-thead");
  thead.innerHTML = `
    <th class="left" style="width:28px"></th>
    <th class="left">Player</th>
    <th colspan="6" style="text-align:center;color:var(--gold-dim);border-bottom:1px solid var(--border)">Points per Country</th>
    <th>Bonus</th>
    <th>Total</th>
  `;

  const tbody = document.getElementById("league-tbody");
  tbody.innerHTML = "";

  standings.forEach((row, i) => {
    const tr = document.createElement("tr");
    if (row.bonus > 0) tr.classList.add("bonus-row");

    const posCell = i < 3
      ? `<td class="pos-medal">${MEDALS[i]}</td>`
      : `<td class="pos">${i+1}</td>`;

    if (i === 0) tr.classList.add('leader-row');

    const teams = PLAYERS[row.player];
    const countryCells = teams.map(t => {
      const ts = teamStats[t];
      const isElim = eliminatedTeams.has(t);
      const worstEntry = worstTeams.find(w => w.team === t);
      const hasPlayed = ts.gp > 0;
      const ptsClass = ts.pts === 0 ? 'zero' : 'positive';
      const elimStyle = isElim ? 'opacity:0.45;' : '';
      const bonusHighlight = worstEntry ? 'bonus-team' : '';
      return `
        <td class="country-cell ${bonusHighlight}" style="${elimStyle}">
          <div class="country-name" title="${t}">${t}</div>
          <div class="country-pts ${hasPlayed ? ptsClass : 'zero'}">${hasPlayed ? ts.pts : '—'}</div>
        </td>`;
    }).join("");

    const bonusDisplay = row.bonus > 0
      ? `<span style="color:var(--green);font-weight:700">+${row.bonus % 1 === 0 ? row.bonus : row.bonus.toFixed(1)}</span>`
      : `<span style="color:var(--muted)">—</span>`;

    tr.innerHTML = `
      ${posCell}
      <td class="left"><span class="player-name${i === 0 ? ' leader' : ''}">${row.player}</span></td>
      ${countryCells}
      <td>${bonusDisplay}</td>
      <td class="total-col">${row.total % 1 === 0 ? row.total : row.total.toFixed(1)}</td>
    `;
    tbody.appendChild(tr);
  });

  // ── Render matches ──
  const played = allMatches.filter(m => m.score?.ft && !m.live);
  const upcoming = allMatches.filter(m => !m.score?.ft || m.live);
  const recent3 = played.slice(-5).reverse();
  const next3 = upcoming.slice(0, 5);

  function renderMatch(m, isUpcoming) {
    const t1 = resolveTeam(m.team1);
    const t2 = resolveTeam(m.team2);
    const p1 = t1 ? TEAM_TO_PLAYER[t1] : null;
    const p2 = t2 ? TEAM_TO_PLAYER[t2] : null;
    const ko = isKnockout(m.round);
    const typeBadge = ko
      ? `<span class="match-type-badge badge-ko">${m.round}</span>`
      : `<span class="match-type-badge badge-group">${m.group || m.round}</span>`;
    const dateStr = m.date ? new Date(m.date).toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'}) : '';
    let scoreHtml;
    if (m.live) {
      scoreHtml = `<div class="match-score" style="color:var(--red)">${m.liveScore[0]} – ${m.liveScore[1]}<div style="font-size:0.55rem;letter-spacing:0.08em;color:var(--red);animation:pulse-name 1s ease-in-out infinite">${m.elapsed ? m.elapsed+"'" : 'LIVE'}</div></div>`;
    } else if (isUpcoming) {
      const kickoff = m.time ? m.time.slice(0,5) : '';
      scoreHtml = `<div class="match-score upcoming">${kickoff || 'vs'}</div>`;
    } else {
      scoreHtml = `<div class="match-score">${m.score.ft[0]} – ${m.score.ft[1]}</div>`;
    }
    return `
      <div class="match-card">
        <div class="match-meta"><span>${dateStr}</span><span>${typeBadge}</span></div>
        <div class="match-teams">
          <div class="match-team">
            <div class="match-team-name">${m.team1}</div>
            <div class="match-team-owner">${p1 ? '👤 '+p1 : ''}</div>
          </div>
          ${scoreHtml}
          <div class="match-team right">
            <div class="match-team-name">${m.team2}</div>
            <div class="match-team-owner">${p2 ? '👤 '+p2 : ''}</div>
          </div>
        </div>
      </div>`;
  }

  document.getElementById("recent-matches").innerHTML =
    recent3.length ? recent3.map(m => renderMatch(m, false)).join("") : '<p style="color:var(--muted);font-size:0.85rem">No results yet</p>';
  document.getElementById("upcoming-matches").innerHTML =
    next3.length ? next3.map(m => renderMatch(m, true)).join("") : '<p style="color:var(--muted);font-size:0.85rem">No upcoming fixtures</p>';

  // ── Render all teams table ──
  const allTeamsSorted = Object.entries(teamStats)
    .sort(([,a],[,b]) => b.pts !== a.pts ? b.pts - a.pts : (b.gf-b.ga) - (a.gf-a.ga));

  const teamsTbody = document.getElementById("teams-body");
  teamsTbody.innerHTML = "";
  allTeamsSorted.forEach(([team, ts], idx) => {
    const tr = document.createElement("tr");
    const gd = ts.gf - ts.ga;
    const gdStr = gd > 0 ? '+'+gd : String(gd);
    const gdClass = gd > 0 ? 'gd-pos' : gd < 0 ? 'gd-neg' : '';
    const worstEntry = worstTeams.find(w => w.team === team);
    const bonusBadge = worstEntry ? `<span class="bonus-badge">⭐ +${worstEntry.bonus % 1 === 0 ? worstEntry.bonus : worstEntry.bonus.toFixed(1)}</span>` : '';
    const owner = TEAM_TO_PLAYER[team] || '—';
    tr.innerHTML = `
      <td class="pos">${idx+1}</td>
      <td>${team}${bonusBadge}</td>
      <td style="color:var(--muted);font-size:0.82rem">${owner}</td>
      <td class="r">${ts.gp}</td>
      <td class="r ${gdClass}">${ts.gp > 0 ? gdStr : '—'}</td>
      <td class="r" style="font-weight:700">${ts.pts}</td>
    `;
    teamsTbody.appendChild(tr);
  });

  document.getElementById("last-updated").textContent =
    "Live data via API-Football · Updated " + new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
  document.getElementById("status").style.display = "none";
  document.getElementById("content").style.display = "block";
}

loadData();
</script>
</body>
</html>
