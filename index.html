<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Fantasy League</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --gold: #C9A84C;
    --gold-dim: #8A6B28;
    --pitch: #0B3D1E;
    --pitch-mid: #112E18;
    --pitch-light: #1A4A28;
    --surface: #0E1A12;
    --border: rgba(201,168,76,0.18);
    --text: #E8EDE9;
    --muted: #7A9480;
    --red: #E05050;
    --green: #4EC97B;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--surface);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header {
    background: var(--pitch);
    border-bottom: 2px solid var(--gold);
    padding: 22px 24px 18px;
    text-align: center;
    position: relative;
  }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 3.4rem);
    letter-spacing: 0.08em;
    color: var(--gold);
    line-height: 1;
  }
  .header-sub {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .last-updated { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
  .refresh-btn {
    position: absolute; top: 18px; right: 18px;
    background: transparent; border: 1px solid var(--border);
    color: var(--gold); padding: 6px 13px; border-radius: 4px;
    cursor: pointer; font-size: 0.75rem; letter-spacing: 0.05em; transition: background 0.2s;
  }
  .refresh-btn:hover { background: rgba(201,168,76,0.1); }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 16px; }
  section { margin-top: 32px; }

  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; letter-spacing: 0.1em;
    color: var(--gold-dim); border-bottom: 1px solid var(--border);
    padding-bottom: 6px; margin-bottom: 14px;
  }

  /* ── Main league table ── */
  .league-table { width: 100%; border-collapse: collapse; }
  .league-table th {
    font-size: 0.63rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); padding: 6px 6px 8px; text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .league-table th.left { text-align: left; }
  .league-table td {
    padding: 10px 6px; font-size: 0.82rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle; text-align: center;
  }
  .league-table td.left { text-align: left; }
  .league-table tr:hover td { background: rgba(255,255,255,0.02); }

  .pos { font-size: 0.8rem; color: var(--muted); width: 24px; }
  .pos-medal { font-size: 1.1rem; width: 24px; }

  .player-name { font-weight: 700; font-size: 0.9rem; white-space: nowrap; }

  /* country point cells */
  .country-cell {
    min-width: 52px;
    border-radius: 4px;
    padding: 6px 4px !important;
  }
  .country-name {
    font-size: 0.62rem; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 56px; margin: 0 auto;
  }
  .country-pts {
    font-size: 1rem; font-weight: 700; line-height: 1.2;
  }
  .country-pts.zero { color: var(--muted); font-weight: 400; }
  .country-pts.positive { color: var(--text); }
  .country-cell.not-played { opacity: 0.35; }
  .country-cell.bonus-team { background: rgba(78,201,123,0.08); border: 1px solid rgba(78,201,123,0.25); }

  .bonus-col { color: var(--green); font-weight: 700; font-size: 0.95rem; }
  .bonus-col.zero { color: var(--muted); font-weight: 400; }
  .total-col { font-weight: 700; font-size: 1.05rem; }

  .bonus-row td { background: rgba(78,201,123,0.05) !important; }

  /* ── Match cards ── */
  .match-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
  }
  .match-card {
    background: var(--pitch-mid); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px; font-size: 0.82rem;
  }
  .match-meta {
    font-size: 0.67rem; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.06em; margin-bottom: 8px;
    display: flex; justify-content: space-between;
  }
  .match-teams { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .match-team { flex: 1; }
  .match-team.right { text-align: right; }
  .match-team-name { font-weight: 600; font-size: 0.88rem; }
  .match-team-owner { font-size: 0.68rem; color: var(--muted); }
  .match-score {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem;
    letter-spacing: 0.05em; color: var(--gold); min-width: 56px; text-align: center;
  }
  .match-score.upcoming { color: var(--muted); font-size: 1rem; }
  .match-type-badge { font-size: 0.64rem; border-radius: 3px; padding: 1px 5px; }
  .badge-ko { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid var(--border); }
  .badge-group { background: rgba(26,74,40,0.5); color: var(--muted); border: 1px solid rgba(255,255,255,0.06); }

  /* ── All teams table ── */
  .teams-table { width: 100%; border-collapse: collapse; }
  .teams-table th {
    font-size: 0.63rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); padding: 6px 10px 8px;
    border-bottom: 1px solid var(--border);
  }
  .teams-table th.r, .teams-table td.r { text-align: right; }
  .teams-table td {
    padding: 9px 10px; font-size: 0.84rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }
  .teams-table tr:hover td { background: rgba(255,255,255,0.02); }
  .gd-pos { color: var(--green); }
  .gd-neg { color: var(--red); }
  .bonus-badge {
    font-size: 0.68rem; color: var(--green);
    background: rgba(78,201,123,0.10); border: 1px solid rgba(78,201,123,0.25);
    border-radius: 3px; padding: 1px 5px; margin-left: 6px;
  }

  /* ── Status ── */
  #status { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.9rem; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 700px) {
    .country-name { font-size: 0.55rem; max-width: 44px; }
    .country-pts { font-size: 0.85rem; }
    .country-cell { min-width: 40px; }
  }
</style>
</head>
<body>

<header>
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  <div class="header-title">World Cup 2026</div>
  <div class="header-sub">and with the first pick <span id="leader-name">…</span> selects</div>
  <div class="last-updated" id="last-updated"></div>
</header>

<div class="container">
  <div id="status"><div class="spinner"></div>Loading match data…</div>
  <div id="content" style="display:none">

    <section>
      <div class="section-label">🏆 League Table</div>
      <div style="overflow-x:auto">
        <table class="league-table" id="league-table">
          <thead>
            <tr id="league-thead"></tr>
          </thead>
          <tbody id="league-tbody"></tbody>
        </table>
      </div>
    </section>

    <section>
      <div class="section-label">⚽ Last 3 Results</div>
      <div class="match-grid" id="recent-matches"></div>
    </section>

    <section>
      <div class="section-label">📅 Next 3 Fixtures</div>
      <div class="match-grid" id="upcoming-matches"></div>
    </section>

    <section>
      <div class="section-label">🌍 All 48 Teams — Ranked by Points</div>
      <table class="teams-table">
        <thead>
          <tr>
            <th style="width:32px"></th>
            <th>Team</th>
            <th>Owner</th>
            <th class="r">GP</th>
            <th class="r">GD</th>
            <th class="r">Pts</th>
          </tr>
        </thead>
        <tbody id="teams-body"></tbody>
      </table>
    </section>

  </div>
</div>

<script>
const PLAYERS = {
  Chris:  ["France", "USA", "Ecuador", "Norway", "Scotland", "Ghana"],
  Edd:    ["England", "Mexico", "Australia", "Canada", "Tunisia", "Saudi Arabia"],
  Phil:   ["Argentina", "Senegal", "Austria", "Sweden", "Paraguay", "Haiti"],
  Emily:  ["Portugal", "Colombia", "Iran", "Ivory Coast", "Qatar", "Jordan"],
  Amy:    ["Netherlands", "Belgium", "Turkey", "Czech Republic", "Iraq", "Curacao"],
  Adam:   ["Brazil", "Croatia", "South Korea", "Algeria", "DR Congo", "Cape Verde"],
  Ralph:  ["Morocco", "Germany", "Japan", "Egypt", "Uzbekistan", "Bosnia & Herzegovina"],
  Packer: ["Spain", "Uruguay", "Switzerland", "Panama", "South Africa", "New Zealand"]
};

// Maps every name variant (lower-cased) -> canonical name as used in PLAYERS
// Canonical is the PLAYERS key; aliases are what the API might use
const NAME_MAP = (() => {
  const m = {};
  // identity for all player team names
  for (const teams of Object.values(PLAYERS))
    for (const t of teams) m[t.toLowerCase()] = t;
  // explicit aliases -> canonical
  const aliases = {
    "USA":                    ["united states", "united states of america"],
    "Ivory Coast":            ["côte d'ivoire", "cote d'ivoire"],
    "Bosnia & Herzegovina":   ["bosnia-herzegovina", "bosnia and herzegovina", "bosnia & herzegovina"],
    "DR Congo":               ["congo dr", "democratic republic of congo", "drc", "dr congo"],
    "Cape Verde":             ["cabo verde"],
    "South Korea":            ["korea republic", "korea dpr"],
    "Curacao":                ["curaçao"],
  };
  for (const [canon, alts] of Object.entries(aliases))
    for (const a of alts) m[a.toLowerCase()] = canon;
  return m;
})();

function resolveTeam(apiName) {
  if (!apiName) return null;
  return NAME_MAP[apiName.toLowerCase()] || null;
}

// reverse: canonical team name -> player name
const TEAM_TO_PLAYER = {};
for (const [player, teams] of Object.entries(PLAYERS))
  for (const t of teams) TEAM_TO_PLAYER[t] = player;

const KNOCKOUT_ROUNDS = ["round of 32","round of 16","quarter-final","semi-final","third place","final"];
function isKnockout(round) {
  return round && KNOCKOUT_ROUNDS.some(r => round.toLowerCase().includes(r));
}

const MEDALS = {0:"🥇", 1:"🥈", 2:"🥉"};

async function loadData() {
  document.getElementById("status").style.display = "block";
  document.getElementById("content").style.display = "none";
  document.getElementById("status").innerHTML = '<div class="spinner"></div>Loading match data…';

  const urls = [
    "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json",
    "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.knockout.json"
  ];

  let allMatches = [];
  for (const url of urls) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const data = await res.json();
      const matches = data.matches || data;
      if (Array.isArray(matches)) allMatches.push(...matches);
    } catch(e) {}
  }

  if (!allMatches.length) {
    document.getElementById("status").innerHTML = '⚠️ Could not load match data. Please try refreshing.';
    return;
  }

  allMatches.sort((a,b) => new Date(a.date) - new Date(b.date));

  // ── Per-team stats (no double counting) ──
  // Key: canonical team name
  const teamStats = {};
  for (const teams of Object.values(PLAYERS))
    for (const t of teams)
      teamStats[t] = { pts:0, gf:0, ga:0, gp:0 };

  for (const m of allMatches) {
    if (!m.score?.ft) continue;
    const [g1, g2] = m.score.ft;
    const t1 = resolveTeam(m.team1);
    const t2 = resolveTeam(m.team2);
    if (t1 && teamStats[t1]) {
      teamStats[t1].gp++;
      teamStats[t1].gf += g1; teamStats[t1].ga += g2;
      teamStats[t1].pts += g1 > g2 ? 3 : g1 === g2 ? 1 : 0;
    }
    if (t2 && teamStats[t2]) {
      teamStats[t2].gp++;
      teamStats[t2].gf += g2; teamStats[t2].ga += g1;
      teamStats[t2].pts += g2 > g1 ? 3 : g1 === g2 ? 1 : 0;
    }
  }

  // ── Bonus: worst 3 teams by pts then GD, split that slot's value equally ──
  const bonusValues = [5, 3, 1];
  const bonusDeductions = {}; // player -> bonus pts earned
  const worstTeams = [];

  const teamList = Object.entries(teamStats)
    .filter(([, ts]) => ts.gp > 0)
    .sort(([,a],[,b]) => a.pts !== b.pts ? a.pts - b.pts : (a.gf-a.ga) - (b.gf-b.ga));

  let slot = 0;
  while (slot < 3 && slot < teamList.length) {
    const [, ts0] = teamList[slot];
    // find end of tie group
    let end = slot + 1;
    while (end < teamList.length) {
      const [, tsN] = teamList[end];
      if (tsN.pts !== ts0.pts || (tsN.gf - tsN.ga) !== (ts0.gf - ts0.ga)) break;
      end++;
    }
    // all teams slot..end-1 are tied; award only for slots within 0-2
    const allTied = teamList.slice(slot, end);
    const slotsAwarded = Math.min(end, 3) - slot; // how many bonus slots this tie group covers
    const totalBonus = bonusValues.slice(slot, slot + slotsAwarded).reduce((s,v) => s+v, 0);
    const splitBonus = Math.round((totalBonus / allTied.length) * 100) / 100;
    for (const [team, ts] of allTied) {
      const player = TEAM_TO_PLAYER[team];
      if (player) bonusDeductions[player] = (bonusDeductions[player] || 0) + splitBonus;
      worstTeams.push({ team, player, bonus: splitBonus });
    }
    slot = end;
  }

  // ── Player stats (summed from team stats) ──
  const playerStats = {};
  for (const [player, teams] of Object.entries(PLAYERS)) {
    let pts = 0, gf = 0, ga = 0;
    for (const t of teams) {
      const ts = teamStats[t];
      pts += ts.pts; gf += ts.gf; ga += ts.ga;
    }
    const bonus = bonusDeductions[player] || 0;
    playerStats[player] = { pts, gf, ga, gd: gf-ga, bonus, total: pts + bonus };
  }

  const standings = Object.entries(playerStats)
    .map(([player, s]) => ({ player, ...s }))
    .sort((a,b) => b.total !== a.total ? b.total - a.total : b.pts !== a.pts ? b.pts - a.pts : b.gd - a.gd);

  // ── Update header leader ──
  const leaderEl = document.getElementById('leader-name');
  if (leaderEl && standings.length) leaderEl.textContent = standings[0].player;

  // ── Knockout eliminations ──
  const eliminatedTeams = new Set();
  for (const m of allMatches) {
    if (!isKnockout(m.round) || !m.score?.ft) continue;
    const [g1, g2] = m.score.ft;
    if (g1 > g2) eliminatedTeams.add(resolveTeam(m.team2));
    else if (g2 > g1) eliminatedTeams.add(resolveTeam(m.team1));
  }

  // ── Render league table ──
  // Header row: Pos | Player | [6 country cols] | Bonus | Total
  const thead = document.getElementById("league-thead");
  thead.innerHTML = `
    <th class="left" style="width:28px"></th>
    <th class="left">Player</th>
    <th colspan="6" style="text-align:center;color:var(--gold-dim);border-bottom:1px solid var(--border)">Points per Country</th>
    <th>Bonus</th>
    <th>Total</th>
  `;

  const tbody = document.getElementById("league-tbody");
  tbody.innerHTML = "";

  standings.forEach((row, i) => {
    const tr = document.createElement("tr");
    if (row.bonus > 0) tr.classList.add("bonus-row");

    const posCell = i < 3
      ? `<td class="pos-medal">${MEDALS[i]}</td>`
      : `<td class="pos">${i+1}</td>`;

    const teams = PLAYERS[row.player];
    const countryCells = teams.map(t => {
      const ts = teamStats[t];
      const isElim = eliminatedTeams.has(t);
      const worstEntry = worstTeams.find(w => w.team === t);
      const hasPlayed = ts.gp > 0;
      const ptsClass = ts.pts === 0 ? 'zero' : 'positive';
      const elimStyle = isElim ? 'opacity:0.45;' : '';
      const bonusHighlight = worstEntry ? 'bonus-team' : '';
      return `
        <td class="country-cell ${bonusHighlight}" style="${elimStyle}">
          <div class="country-name" title="${t}">${t}</div>
          <div class="country-pts ${hasPlayed ? ptsClass : 'zero'}">${hasPlayed ? ts.pts : '—'}</div>
        </td>`;
    }).join("");

    const bonusDisplay = row.bonus > 0
      ? `<span style="color:var(--green);font-weight:700">+${row.bonus % 1 === 0 ? row.bonus : row.bonus.toFixed(1)}</span>`
      : `<span style="color:var(--muted)">—</span>`;

    tr.innerHTML = `
      ${posCell}
      <td class="left"><span class="player-name">${row.player}</span></td>
      ${countryCells}
      <td>${bonusDisplay}</td>
      <td class="total-col">${row.total % 1 === 0 ? row.total : row.total.toFixed(1)}</td>
    `;
    tbody.appendChild(tr);
  });

  // ── Render matches ──
  const played = allMatches.filter(m => m.score?.ft);
  const upcoming = allMatches.filter(m => !m.score?.ft);
  const recent3 = played.slice(-3).reverse();
  const next3 = upcoming.slice(0, 3);

  function renderMatch(m, isUpcoming) {
    const t1 = resolveTeam(m.team1);
    const t2 = resolveTeam(m.team2);
    const p1 = t1 ? TEAM_TO_PLAYER[t1] : null;
    const p2 = t2 ? TEAM_TO_PLAYER[t2] : null;
    const ko = isKnockout(m.round);
    const typeBadge = ko
      ? `<span class="match-type-badge badge-ko">${m.round}</span>`
      : `<span class="match-type-badge badge-group">${m.group || m.round}</span>`;
    const dateStr = m.date ? new Date(m.date).toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'}) : '';
    const scoreHtml = isUpcoming
      ? `<div class="match-score upcoming">vs</div>`
      : `<div class="match-score">${m.score.ft[0]} – ${m.score.ft[1]}</div>`;
    return `
      <div class="match-card">
        <div class="match-meta"><span>${dateStr}</span><span>${typeBadge}</span></div>
        <div class="match-teams">
          <div class="match-team">
            <div class="match-team-name">${m.team1}</div>
            <div class="match-team-owner">${p1 ? '👤 '+p1 : ''}</div>
          </div>
          ${scoreHtml}
          <div class="match-team right">
            <div class="match-team-name">${m.team2}</div>
            <div class="match-team-owner">${p2 ? '👤 '+p2 : ''}</div>
          </div>
        </div>
      </div>`;
  }

  document.getElementById("recent-matches").innerHTML =
    recent3.length ? recent3.map(m => renderMatch(m, false)).join("") : '<p style="color:var(--muted);font-size:0.85rem">No results yet</p>';
  document.getElementById("upcoming-matches").innerHTML =
    next3.length ? next3.map(m => renderMatch(m, true)).join("") : '<p style="color:var(--muted);font-size:0.85rem">No upcoming fixtures</p>';

  // ── Render all teams table ──
  const allTeamsSorted = Object.entries(teamStats)
    .sort(([,a],[,b]) => b.pts !== a.pts ? b.pts - a.pts : (b.gf-b.ga) - (a.gf-a.ga));

  const teamsTbody = document.getElementById("teams-body");
  teamsTbody.innerHTML = "";
  allTeamsSorted.forEach(([team, ts], idx) => {
    const tr = document.createElement("tr");
    const gd = ts.gf - ts.ga;
    const gdStr = gd > 0 ? '+'+gd : String(gd);
    const gdClass = gd > 0 ? 'gd-pos' : gd < 0 ? 'gd-neg' : '';
    const worstEntry = worstTeams.find(w => w.team === team);
    const bonusBadge = worstEntry ? `<span class="bonus-badge">⭐ +${worstEntry.bonus % 1 === 0 ? worstEntry.bonus : worstEntry.bonus.toFixed(1)}</span>` : '';
    const owner = TEAM_TO_PLAYER[team] || '—';
    tr.innerHTML = `
      <td class="pos">${idx+1}</td>
      <td>${team}${bonusBadge}</td>
      <td style="color:var(--muted);font-size:0.82rem">${owner}</td>
      <td class="r">${ts.gp}</td>
      <td class="r ${gdClass}">${ts.gp > 0 ? gdStr : '—'}</td>
      <td class="r" style="font-weight:700">${ts.pts}</td>
    `;
    teamsTbody.appendChild(tr);
  });

  document.getElementById("last-updated").textContent =
    "Updated " + new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
  document.getElementById("status").style.display = "none";
  document.getElementById("content").style.display = "block";
}

loadData();
</script>
</body>
</html>
